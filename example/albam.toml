title = "My Albums"

[server]
host = "127.0.0.1"
port = 8080

[media]
source_dir = "albums"
cache_dir = ".albam/cache"
allow_original_download = false

[privacy]
map_enabled = false
expose_gps = false
location_precision = "hidden"

[database]
path = ".albam/db.sqlite"

[build]
out_dir = ".albam/public"

[theme]
name = "default"
dir = "../themes/default"

[theme.params.appearance]
accent = "coral"

[theme.params.layout]
album_grid_columns = 4

[theme.params.features]
show_header = true
show_footer = true

[theme.params.content]
brand = "albam"
home_title = "My Albums2"
home_eyebrow = "SELF-HOSTED PHOTO ALBUM"
home_description = "a simple folder-based album"
copyright = "powell © 2026"
