name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up release toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libc6-dev

      - name: Package default theme
        run: |
          tar \
            --exclude='default/node_modules' \
            --exclude='default/dist' \
            --exclude='default/.astro' \
            -czf "$RUNNER_TEMP/theme_default.tar.gz" \
            -C themes \
            default

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload default theme asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "$RUNNER_TEMP/theme_default.tar.gz" --clobber
